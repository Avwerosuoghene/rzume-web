<section class="dashboard_container">
  <!-- Job Stats with Skeleton -->
  @if (isLoadingStats) {
    <app-job-stats-skeleton [isMobile]="isMobile"></app-job-stats-skeleton>
  } @else {
    <app-job-stats [statHighLights]="statHighLights"></app-job-stats>
  }

  <!-- Job List with Skeleton -->
  @if (isMobile) {
    @if (isLoadingJobs) {
      <app-card-skeleton></app-card-skeleton>
    } @else {
      <app-job-card-list
        [jobs]="data"
        [isLoading]="false"
        [totalItems]="totalItems"
        (jobApplicationUpdate)="updateJobApplication($event)"
        (jobStatusUpdate)="handleStatusUpdate($event)"
        (jobApplicationsDelete)="handleDeleteApplications($event)"
        (jobApplicationAddition)="addNewApplicationEntry()"
        (filterChange)="handleFilterChange($event)"
        (loadMore)="handleLoadMore()"
      >
      </app-job-card-list>
    }
  } @else {
    @if (!showEmptyState) {
      <app-job-list-toolbar
        class="job-list-toolbar"
        (filterChange)="handleFilterChange($event)"
        (searchChange)="handleSearchChange($event)"
        (jobApplicationAddition)="addNewApplicationEntry()"
      >
      </app-job-list-toolbar>
    }
    
    @if (isLoadingJobs) {
      <app-table-skeleton></app-table-skeleton>
    } @else {
      <app-empty-state-wrapper
        [data]="data"
        [currentFilter]="currentFilter"
        (actionButtonClicked)="addNewApplicationEntry()"
        class="empty_state_wrapper"
      >
        <app-custom-table
          (onSelectionChanged)="handleSelectionChanged($event)"
          (pageChanged)="handlePageChanged($event)"
          (itemPerPageChanged)="handleChangeInItemPerPage($event)"
          (jobApplicationUpdate)="updateJobApplication($event)"
          (jobStatusUpdate)="handleStatusUpdate($event)"
          (jobApplicationsDelete)="handleDeleteApplications($event)"
          [columns]="jobListColumns"
          [totalPages]="totalPages"
          [currentPage]="currentPage"
          [itemsPerPage]="itemsPerPage"
          [data]="data"
        >
        </app-custom-table>
      </app-empty-state-wrapper>
    }
  }
</section>
