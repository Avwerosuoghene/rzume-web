<div class="auth-mobile_content">
  <div class="auth-mobile_logo_section">
    <a [href]="landingPageUrl" target="_blank" rel="noopener noreferrer">
      <img
        src="assets/icons/rzume_logo_white.svg"
        alt="Rzume Logo"
        class="auth-logo_mobile"
      />
    </a>
  </div>
  <div class="auth-mobile_text_section">

    </p>
  </div>
</div>
