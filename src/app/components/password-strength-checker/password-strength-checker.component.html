<div class="password-checker-tooltip" 
     [class.visible]="isVisible()" 
     aria-live="polite"
     role="tooltip">
  <div class="tooltip-arrow"></div>
  
  <div class="tooltip-content">
    <!-- Strength Indicator at Top -->
    <div class="strength-header">
      <span class="strength-label">Strength: {{ strengthPercentage() }}%</span>
    </div>
    
    <div class="strength-bar-container">
      <div class="strength-bar-background">
        <div 
          class="strength-bar-fill" 
          [style.width.%]="strengthPercentage()"
          [ngClass]="validationResult().strength"
        ></div>
      </div>
    </div>
    
    <!-- Password Requirements -->
    <div class="requirements-section">
      <h4 class="requirements-title">Password Requirements:</h4>
      
      <ul class="requirements-list">
        @for (requirement of passwordRequirements(); track requirement.name) {
          <li 
            class="requirement-item"
            [ngClass]="getRequirementStatus(requirement)"
            [attr.aria-label]="getRequirementAriaLabel(requirement)"
          >
            @if (getRequirementStatus(requirement) === 'valid') {
              <mat-icon class="requirement-icon">check</mat-icon>
            }
            <span class="requirement-text">{{ requirement.description }}</span>
          </li>
        }
      </ul>
    </div>
  </div>
</div>
